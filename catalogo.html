<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    padding:20px;
}

/* 5 CUADROS POR FILA */
.catalogo{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:20px;
}

/* TARJETAS */
.card{
    background:white;
    border:1px solid #ddd;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.info{
    padding:12px;
}

.titulo{
    font-size:14px;
    color:#555;
    margin-bottom:8px;
}

.precio{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

.colores{
    display:flex;
    gap:8px;
}

.color{
    width:16px;
    height:16px;
    border-radius:50%;
    border:1px solid #aaa;
}

.negro{background:black;}
.gris{background:gray;}
.blanco{background:white;}
.beige{background:beige;}

/* RESPONSIVE */

@media(max-width:1200px){
    .catalogo{
        grid-template-columns:repeat(3,1fr);
    }
}

@media(max-width:700px){
    .catalogo{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:500px){
    .catalogo{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="catalogo">
